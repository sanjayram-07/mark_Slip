<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Mark Slip Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #f4f7fb 0%, #e5eaef 100%);
            color: #2f3a47;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #d1d9e2;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="file"]:focus {
            outline: none;
            border-color: #0f3d5d;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .file-input-text {
            display: block;
            padding: 12px 15px;
            border: 2px dashed #0f3d5d;
            border-radius: 6px;
            background: #ffffff;
            color: #0f3d5d;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input-text:hover {
            background: #f2f5f9;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-name {
            display: block;
            margin-top: 8px;
            font-size: 13px;
            color: #0f3d5d;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-process {
            background: linear-gradient(135deg, #0f3d5d 0%, #234760 100%);
            color: white;
        }

        .btn-process:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(15, 61, 93, 0.25);
        }

        .btn-process:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #e0e0e0;
            color: #333;
        }

        .btn-reset:hover {
            background: #d0d0d0;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .alert-info {
            background: #eef;
            color: #33c;
            border: 1px solid #ccf;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0f3d5d;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #0f3d5d;
            font-weight: 600;
            font-size: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Student Mark Slip Generator</h1>
            <p>Upload your marks PDF and generate formatted mark slips</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="uploadForm">
            <div class="form-group">
                <label for="fileInput">Upload PDF File *</label>
                <div class="file-input-wrapper">
                    <label class="file-input-text" for="fileInput">
                        Choose PDF file or drag here
                    </label>
                    <input type="file" id="fileInput" name="file" accept=".pdf" required>
                    <span class="file-name" id="fileName"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="college">College Name</label>
                    <input type="text" id="college" name="college" 
                           value="Madras Institute of Technology" placeholder="Enter college name">
                </div>

                <div class="form-group">
                    <label for="dept">Department Name</label>
                    <input type="text" id="dept" name="dept" 
                           value="Department of Computer Technology" placeholder="Enter department name">
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-process" id="processBtn">
                    ✓ Process & Download
                </button>
                <button type="reset" class="btn-reset" id="resetBtn">
                    ↻ Reset
                </button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">Processing your PDF...</div>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const fileNameSpan = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const loading = document.getElementById('loading');
        const alert = document.getElementById('alert');

        // File input change handler
        fileInput.addEventListener('change', function(e) {
            if (this.files.length > 0) {
                const fileName = this.files[0].name;
                const fileSize = (this.files[0].size / 1024 / 1024).toFixed(2);
                fileNameSpan.textContent = `Selected: ${fileName} (${fileSize} MB)`;
            } else {
                fileNameSpan.textContent = '';
            }
        });

        // Drag and drop handler
        const dropZone = document.querySelector('.file-input-wrapper');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.opacity = '0.7';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.opacity = '1';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.opacity = '1';
            
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                fileInput.files = files;
                const event = new Event('change', { bubbles: true });
                fileInput.dispatchEvent(event);
            } else {
                showAlert('Please drop a PDF file', 'error');
            }
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!fileInput.files.length) {
                showAlert('Please select a PDF file', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('college', document.getElementById('college').value);
            formData.append('dept', document.getElementById('dept').value);

            try {
                processBtn.disabled = true;
                loading.style.display = 'block';
                hideAlert();

                const response = await fetch('/api/process', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || `HTTP error! status: ${response.status}`);
                }

                // Download the PDF
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'student_mark_slips.pdf';
                document.body.appendChild(link);
                link.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(link);

                showAlert('PDF generated and downloaded successfully! ✓', 'success');
                form.reset();
                fileNameSpan.textContent = '';

            } catch (error) {
                console.error('Error:', error);
                showAlert(`Error: ${error.message}`, 'error');
            } finally {
                processBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Alert helper functions
        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
        }

        function hideAlert() {
            alert.className = 'alert';
        }
    </script>
</body>
</html>
